<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Removly - Background Remover</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    .checkerboard {
      background-image: linear-gradient(45deg, #e5e5e5 25%, transparent 25%),
                        linear-gradient(-45deg, #e5e5e5 25%, transparent 25%),
                        linear-gradient(45deg, transparent 75%, #e5e5e5 75%),
                        linear-gradient(-45deg, transparent 75%, #e5e5e5 75%);
      background-size: 24px 24px;
    }
    img { max-height: 520px; width: auto; object-fit: contain; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-wand-magic-sparkles text-4xl text-teal-500"></i>
        <h1 class="text-3xl font-bold">Removly</h1>
      </div>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-6 py-12">

    <div id="upload-screen">
      <div class="text-center mb-12">
        <h2 class="text-5xl font-bold mb-4">Background Remover</h2>
        <p class="text-xl text-gray-600">Unlimited • Fast • Free</p>
      </div>

      <div id="drop-zone" class="border-4 border-dashed border-teal-400 rounded-3xl p-20 text-center hover:border-teal-500 transition">
        <i class="fa-solid fa-cloud-arrow-up text-8xl text-teal-400 mb-8"></i>
        <h3 class="text-2xl font-semibold">Drop image here</h3>
        <button onclick="document.getElementById('file-input').click()" 
                class="mt-6 bg-teal-500 text-white px-12 py-5 rounded-2xl text-xl hover:bg-teal-600">
          Upload Image
        </button>
        <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFile(event)">
      </div>

      <div class="mt-16 text-center">
        <p class="text-gray-500 mb-6">Try Samples</p>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="samples"></div>
      </div>
    </div>

    <!-- Result -->
    <div id="result-screen" class="hidden">
      <button onclick="backToUpload()" class="mb-8 text-teal-600 flex items-center gap-2 text-lg">
        <i class="fa-solid fa-arrow-left"></i> New Photo
      </button>

      <div class="grid md:grid-cols-2 gap-10">
        <div>
          <p class="font-semibold text-gray-600 mb-4">Original</p>
          <div class="bg-white p-6 rounded-3xl shadow-xl">
            <img id="original-img" class="mx-auto rounded-2xl" alt="">
          </div>
        </div>
        <div>
          <p class="font-semibold text-gray-600 mb-4">Background Removed</p>
          <div class="bg-white p-6 rounded-3xl shadow-xl checkerboard">
            <img id="result-img" class="mx-auto rounded-2xl" alt="">
          </div>
        </div>
      </div>

      <div class="text-center mt-12">
        <button onclick="downloadImage()" 
                class="bg-teal-500 text-white px-16 py-6 rounded-3xl text-2xl font-medium hover:bg-teal-600 flex items-center gap-3 mx-auto">
          <i class="fa-solid fa-download"></i> Download Image
        </button>
      </div>
    </div>
  </div>

  <script>
    let currentOriginal = null;

    function handleFile(e) {
      const file = e.target.files[0];
      if (file) processImage(file);
    }

    function processImage(file) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        currentOriginal = ev.target.result;

        document.getElementById('upload-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        document.getElementById('original-img').src = currentOriginal;
        document.getElementById('result-img').src = currentOriginal; // Simulation
      };
      reader.readAsDataURL(file);
    }

    const samples = [
      "https://picsum.photos/id/64/800/800",
      "https://picsum.photos/id/201/800/800",
      "https://picsum.photos/id/237/800/800",
      "https://picsum.photos/id/1015/800/800"
    ];

    function renderSamples() {
      const container = document.getElementById('samples');
      samples.forEach(src => {
        const div = document.createElement('div');
        div.className = "cursor-pointer rounded-2xl overflow-hidden shadow-md hover:shadow-2xl transition";
        div.innerHTML = `<img src="${src}" class="w-full h-44 object-cover">`;
        div.onclick = () => {
          document.getElementById('upload-screen').classList.add('hidden');
          document.getElementById('result-screen').classList.remove('hidden');
          document.getElementById('original-img').src = src;
          document.getElementById('result-img').src = src;
        };
        container.appendChild(div);
      });
    }

    function backToUpload() {
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('upload-screen').classList.remove('hidden');
    }

    function downloadImage() {
      const a = document.createElement('a');
      a.href = document.getElementById('result-img').src;
      a.download = 'removly-image.png';
      a.click();
    }

    window.onload = () => {
      renderSamples();

      const dropZone = document.getElementById('drop-zone');
      dropZone.ondragover = e => { e.preventDefault(); dropZone.style.borderColor = '#14b8a6'; };
      dropZone.ondragleave = () => dropZone.style.borderColor = '#99f6e4';
      dropZone.ondrop = e => {
        e.preventDefault();
        dropZone.style.borderColor = '#99f6e4';
        if (e.dataTransfer.files[0]) processImage(e.dataTransfer.files[0]);
      };
    };
  </script>
</body>
</html>
